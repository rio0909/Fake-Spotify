<!DOCTYPE html>
<html>
<head>
    <title>Rio Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: #000; padding: 25px; border-right: 1px solid #282828; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h2 { color: #1DB954; font-size: 24px; margin: 0 0 10px 0; }
        
        .account-top { background: #121212; padding: 12px; border-radius: 8px; border: 1px solid #282828; margin-bottom: 25px; }
        .user-tag { display: block; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .user-name { display: block; color: #1DB954; font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        .logout-link { color: #ff4444; font-size: 11px; text-decoration: none; font-weight: bold; border: 1px solid #ff4444; padding: 4px 8px; border-radius: 4px; }

        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { color: #b3b3b3; text-decoration: none; font-weight: bold; font-size: 15px; padding: 12px; border-radius: 4px; display: flex; align-items: center; gap: 15px; transition: 0.2s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { color: white; background: #282828; }

        .main-container { flex-grow: 1; display: flex; flex-direction: column; background: linear-gradient(to bottom, #181818, #121212); }
        .top-bar { padding: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); display: flex; gap: 10px; }
        #search { flex-grow: 1; padding: 12px; background: #282828; border: none; border-radius: 50px; color: white; outline: none; }
        #sc-search-btn { display: none; padding: 0 20px; border-radius: 50px; border: none; background: #ff5500; color: white; cursor: pointer; font-weight: bold; }

        .scroll-view { flex-grow: 1; overflow-y: auto; padding: 0 25px 200px 25px; }
        .song-card { display: flex; align-items: center; padding: 12px; border-radius: 4px; border-bottom: 1px solid #1a1a1a; transition: 0.2s; }
        .song-card:hover { background: #282828; }
        .song-info { flex-grow: 1; cursor: pointer; font-size: 14px; }
        .like-btn { background: none; border: 1px solid #444; color: #b3b3b3; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .like-btn.liked { color: #1DB954; border-color: #1DB954; }

        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #181818; padding: 20px; border-top: 1px solid #282828; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        .player-info { color: #1DB954; font-weight: bold; font-size: 14px; margin-bottom: 12px; }
        .controls-row { display: flex; align-items: center; gap: 40px; margin-bottom: 15px; width: 100%; justify-content: center; position: relative; }
        .btn { background: none; border: 1.5px solid white; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .play-btn { width: 55px; height: 55px; border-color: #1DB954; color: #1DB954; font-size: 20px; }
        
        .volume-box { position: absolute; right: 5%; display: flex; align-items: center; gap: 10px; width: 150px; }
        #volume { width: 100%; accent-color: #1DB954; cursor: pointer; }
        
        .slider-row { width: 80%; display: flex; align-items: center; gap: 15px; }
        #seeker { flex-grow: 1; accent-color: #1DB954; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Rio Music</h2>
        
        <div class="account-top">
            <span class="user-tag">User Account</span>
            <span class="user-name">{{ username }}</span>
            <a href="/logout" class="logout-link">Logout</a>
        </div>

        <div class="nav-group">
            <a href="/" class="nav-item {{ 'active' if not show_liked }}"><i class="fas fa-hdd"></i> Local Server</a>
            <a href="/?show_liked=true" class="nav-item {{ 'active' if show_liked }}"><i class="fas fa-heart"></i> Liked Songs</a>
            <a onclick="showSoundCloud()" class="nav-item" id="nav-sc"><i class="fab fa-soundcloud" style="color:#ff5500;"></i> SoundCloud</a>
        </div>
    </div>

    <div class="main-container">
        <div class="top-bar">
            <input type="text" id="search" placeholder="Search local tracks..." onkeyup="handleSearchInput(event)">
            <button id="sc-search-btn" onclick="searchSC()">Search</button>
        </div>
        
        <div class="scroll-view" id="list">
            {% for song in songs %}
            <div class="song-card local-card">
                <div class="song-info" onclick="playSong('{{ song.file_name }}', '{{ song.display_name }}', {{ loop.index0 }})">{{ song.raw_name }}</div>
                <form action="/toggle-like" method="post" style="margin:0;">
                    <input type="hidden" name="song" value="{{ song.file_name }}">
                    <button type="submit" class="like-btn {{ 'liked' if song.is_liked }}">{{ 'UNLIKE' if song.is_liked else 'LIKE' }}</button>
                </form>
            </div>
            {% endfor %}
        </div>

        <div class="scroll-view" id="sc-list" style="display:none;">
            <div style="padding: 20px; color: #888; text-align: center;">Search above to live-stream from SoundCloud.</div>
        </div>
    </div>

    <div class="player-bar">
        <div id="p-title" class="player-info">Ready to stream</div>
        <div class="controls-row">
            <button class="btn" onclick="prevSong()"><i class="fas fa-step-backward"></i></button>
            <button class="btn play-btn" id="play-pause-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
            <button class="btn" onclick="nextSong()"><i class="fas fa-step-forward"></i></button>
            
            <div class="volume-box">
                <i class="fas fa-volume-up" style="font-size: 14px; color: #888;"></i>
                <input type="range" id="volume" min="0" max="1" step="0.01" value="1" oninput="audio.volume = this.value">
            </div>
        </div>
        <div class="slider-row">
            <input type="range" id="seeker" value="0" step="0.1">
        </div>
        <audio id="player"></audio>
    </div>

    <script>
        const audio = document.getElementById('player');
        const seeker = document.getElementById('seeker');
        const playPauseBtn = document.getElementById('play-pause-btn');
        let currentSongIndex = -1;
        let isSoundCloudMode = false;
        
        // Dynamic NodeList for local cards
        const getLocalCards = () => document.querySelectorAll('.local-card');

        // --- PLAYBACK LOGIC ---
        function playSong(file, name, index) {
            currentSongIndex = index;
            document.getElementById('p-title').innerText = "Playing: " + name.replace(/\\'/g, "'");
            audio.src = "/music/" + file;
            audio.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }

        function playSCSong(url, name) {
            currentSongIndex = -1; // Disable next/prev for SC single streams
            document.getElementById('p-title').innerText = "Streaming: " + name;
            // Hit our backend proxy to resolve the live audio URL
            audio.src = "/api/soundcloud/stream?url=" + encodeURIComponent(url);
            audio.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        }

        function nextSong() { 
            if (currentSongIndex > -1 && currentSongIndex < getLocalCards().length - 1) {
                getLocalCards()[currentSongIndex + 1].querySelector('.song-info').click(); 
            }
        }
        function prevSong() { 
            if (currentSongIndex > 0) {
                getLocalCards()[currentSongIndex - 1].querySelector('.song-info').click(); 
            }
        }

        // --- UI & SEARCH LOGIC ---
        function showSoundCloud() {
            isSoundCloudMode = true;
            document.getElementById('list').style.display = 'none';
            document.getElementById('sc-list').style.display = 'block';
            document.getElementById('search').placeholder = "Search SoundCloud...";
            document.getElementById('search').value = "";
            document.getElementById('sc-search-btn').style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-sc').classList.add('active');
        }

        function handleSearchInput(e) {
            if (isSoundCloudMode) {
                if (e.key === 'Enter') searchSC();
            } else {
                let val = e.target.value.toLowerCase();
                getLocalCards().forEach(card => {
                    card.style.display = card.innerText.toLowerCase().includes(val) ? "flex" : "none";
                });
            }
        }

        async function searchSC() {
            const query = document.getElementById('search').value;
            if (!query) return;
            
            const scList = document.getElementById('sc-list');
            scList.innerHTML = '<div style="padding:20px; color:#1DB954; text-align: center;"><i class="fas fa-spinner fa-spin"></i> Searching live servers...</div>';
            
            try {
                const res = await fetch('/api/soundcloud/search?q=' + encodeURIComponent(query));
                const data = await res.json();
                
                scList.innerHTML = '';
                if (data.error) {
                    scList.innerHTML = '<div style="color:red; padding:20px;">Error: ' + data.error + '</div>';
                    return;
                }
                
                if (data.length === 0) {
                    scList.innerHTML = '<div style="color:#888; padding:20px; text-align: center;">No tracks found.</div>';
                    return;
                }

                data.forEach((track) => {
                    if(!track.title) return;
                    
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    
                    const info = document.createElement('div');
                    info.className = 'song-info';
                    info.innerHTML = `<strong>${track.title}</strong> <span style="color:#888; font-size: 12px;">- ${track.uploader || 'Unknown'}</span>`;
                    
                    info.onclick = () => playSCSong(track.url, track.title);
                    
                    card.appendChild(info);
                    scList.appendChild(card);
                });
            } catch (err) {
                scList.innerHTML = '<div style="color:red; padding:20px;">Network error occurred.</div>';
            }
        }

        // --- HARDWARE CONTROLS ---
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" && document.activeElement.id !== 'search') { e.preventDefault(); togglePlay(); }
        });

        audio.ontimeupdate = () => { if(audio.duration) seeker.value = (audio.currentTime / audio.duration) * 100; };
        seeker.oninput = () => { audio.currentTime = (seeker.value / 100) * audio.duration; };
        audio.onended = nextSong;
    </script>
</body>
</html>
